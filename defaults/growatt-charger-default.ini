[growatt]
#The capacity of the batteries in wh e.g. 9.9kwh
battery_capacity_wh = 9900

#The maximum charge rate the battery is capable of in w e.g. 3000w = 3kw
maximum_charge_rate_w = 3000

#The statement of charge (minimum % the battery will ever drop to)
statement_of_charge_pct = 10

#The minimum charge % that you would like to ever go down to e.g. always charge the batteries to a minimum of 45%
minimum_charge_pct = 45

#The maximum charge % that you would like to ever go up to e.g. never charge the batteries to greater than 100%
maximum_charge_pct = 100

#The average load consumption of your house in w e.g. 850w (used to calculate % charge required to get to the point where you are running purely on solar power)
average_load_w = 850

#TODO - Remove - credentials should be provided via environment variables
#Growatt username as used in the shinephone app
#OPTIONAL - Can also be provided by an environment variable (GROWATT_USERNAME) to avoid credentials coded into this file
#username = <EXAMPLE_USERNAME>

#Growatt password as used in the shinephone app
#OPTIONAL - Can also be provided by an environment variable (GROWATT_PASSWORD) to avoid credentials coded into this file
#password = <EXAMPLE_PASSWORD>


#Growatt Plant ID to be configured - must have a device_sn provided also
#OPTIONAL - If not specified the first Plant & SN combo will be used
#plant_id =

#Growatt Device SN (for the plant ID) to be configured - must be provided as well as plant_id
#OPTIONAL - If not specified the first Plant & SN combo will be used
#device_sn =

[tariff]
#Off peak start time in 24hour clock format
off_peak_start_time = 00:30

#Off peak end time in 24 hour clock format
off_peak_end_time = 04:30

[peak_window]
#Peak window start time (when grid import rates are high) - 24 hour format
#Used by 14:00 afternoon peak-check to decide if battery boost needed
peak_start_time = 16:00

#Peak window end time (when grid import rates return to normal) - 24 hour format
peak_end_time = 19:00

#Decision check time (when to check if boost is needed) - must be before peak_start_time
check_time = 14:00

#Forecast reliability factor for peak window (0.0 to 1.0)
forecast_reliability = 0.4

#SOC safety margin percentage above required minimum
forecast_uncertainty_buffer_pct = 10.0

[forecast.solar]
#Your location e.g. your home address
location = Example House Name, Example Road, Example City, Example Country

# ============================================================================
# SINGLE ARRAY CONFIGURATION (Simple, single orientation)
# ============================================================================
# If you have a single array (all panels facing the same direction), use these:

#The angle of your solar panels in degrees 0=Horizontal, 90=Vertical
declination = 30

#(360 degrees - -180=North, -90=East, 0=South, 90=West)
azimuth = 0

#The nominal power of your solar panels in kw e.g. 6.1kw
kw_power = 6.1

# ============================================================================
# MULTI-ARRAY CONFIGURATION (Multiple orientations)
# ============================================================================
# If you have panels facing multiple directions (e.g., east-facing, south-facing, west-facing),
# configure each array separately below. When arrays are configured, single config values
# (declination, azimuth, kw_power) are ignored.
#
# Format: arrays = [array1_declination, array1_azimuth, array1_kwp]; [array2_declination, array2_azimuth, array2_kwp]; ...
# Example with 3 arrays: arrays = [35, -90, 2.0]; [35, 0, 2.0]; [35, 90, 2.0]
# This would create:
#   - Array 1: 35° tilt, -90° azimuth (east-facing), 2.0 kWp
#   - Array 2: 35° tilt, 0° azimuth (south-facing), 2.0 kWp
#   - Array 3: 35° tilt, 90° azimuth (west-facing), 2.0 kWp
#
# Notes:
#   - Each array query counts as ONE API call
#   - Forecast.Solar free tier: 12 calls/hour limit
#   - Multi-array forecasting is useful for more accurate predictions
#   - Leave this commented out to use single array configuration above
# arrays = [35, -90, 2.0]; [35, 0, 2.0]; [35, 90, 2.0]

#Damping factor - Adjusts the results in the morning and evening
damping = 0

#Confidence in the returned results 0-1 e.g. 0.8 = 80% confidence in the results returned
confidence = 0.8

# Multi-provider configuration
# Comma-separated list of providers to use
# providers = forecast.solar,solcast
providers = forecast.solar

# Which provider to use for charging decisions
primary_provider = forecast.solar

# Automatically fallback if primary fails
fallback_enabled = true

# Log all providers for comparison
log_all_providers = true

[solcast]
# API key - RECOMMENDED: Use environment variable SOLCAST_API_KEY instead
#OPTIONAL - Can also be provided by an environment variable (SOLCAST_API_KEY)
#api_key = <YOUR_SOLCAST_API_KEY>

# Optional: Rooftop site Resource ID(s) for more accurate forecasts
# Comma-separated list if you have multiple arrays
#resource_id = <YOUR_RESOURCE_ID>

# API Cache configuration - reduces redundant API calls to manage rate limits
[cache]
enabled = true
cache_dir = output/cache
ttl_hours = 4.0

[logging]
#Log level for all scripts. Valid values: DEBUG, INFO, WARNING, ERROR
#OPTIONAL - Can also be overridden by the LOG_LEVEL environment variable
#Uncomment and set to DEBUG when you need to diagnose a problem:
#level = DEBUG
level = INFO

[email]
#Set to true to enable email alerts when the inverter status check detects a problem
enabled = false

#SMTP server hostname
#OPTIONAL - Can also be provided by an environment variable (SMTP_SERVER)
#smtp_server = smtp.gmail.com

#SMTP port (587 for TLS/STARTTLS, 465 for SSL)
smtp_port = 587

#Email address to send alerts from
#OPTIONAL - Can also be provided by an environment variable (SENDER_EMAIL)
#sender_email = <EXAMPLE_SENDER@gmail.com>

#Password (or app password) for the sender account
#OPTIONAL - Can also be provided by an environment variable (SENDER_PASSWORD)
#sender_password = <EXAMPLE_APP_PASSWORD>

#Display name shown in the From field - if empty, auto-generated from sender_email
#OPTIONAL - Can also be provided by an environment variable (SENDER_NAME)
sender_name = Solar Tracker

#Email address to send alerts to
#OPTIONAL - Can also be provided by an environment variable (RECIPIENT_EMAIL)
#recipient_email = <EXAMPLE_RECIPIENT@example.com>
